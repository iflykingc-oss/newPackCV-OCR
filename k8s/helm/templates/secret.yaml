apiVersion: v1
kind: Secret
metadata:
  name: {{ include "packcv-ocr.fullname" . }}-secret
  labels:
    {{- include "packcv-ocr.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ⚠️ 生产环境应使用 sealed-secrets 或 external-secrets 注入
  DOUBAO_API_KEY: "{{ .Values.secrets.doubaoApiKey | default "REPLACE_ME" }}"
  KIMI_API_KEY: "{{ .Values.secrets.kimiApiKey | default "REPLACE_ME" }}"
  QWEN_API_KEY: "{{ .Values.secrets.qwenApiKey | default "REPLACE_ME" }}"
  DEEPSEEK_API_KEY: "{{ .Values.secrets.deepseekApiKey | default "REPLACE_ME" }}"
  LANGCHAIN_API_KEY: "{{ .Values.secrets.langchainApiKey | default "REPLACE_ME" }}"
  REDIS_PASSWORD: "{{ .Values.secrets.redisPassword | default "" }}"
