apiVersion: v1
kind: Service
metadata:
  name: {{ include "packcv-ocr.fullname" . }}
  labels:
    {{- include "packcv-ocr.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: metrics
  selector:
    {{- include "packcv-ocr.selectorLabels" . | nindent 4 }}
