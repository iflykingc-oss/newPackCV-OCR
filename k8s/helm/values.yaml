# PackCV-OCR Helm 默认配置
# 部署到 K8s 时可通过 -f values-prod.yaml 覆盖

replicaCount: 2

image:
  repository: packcv/ocr-api
  pullPolicy: IfNotPresent
  tag: "7.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.packcv-ocr.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - api.packcv-ocr.com
      secretName: packcv-ocr-tls

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}

# 应用配置
env:
  - name: ENV
    value: "prod"
  - name: LOG_LEVEL
    value: "INFO"
  - name: REDIS_URL
    value: "redis://packcv-redis:6379/0"
  - name: LANGCHAIN_TRACING_V2
    value: "true"

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
