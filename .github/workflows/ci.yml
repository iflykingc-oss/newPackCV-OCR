name: CI - Test & Quality Check

on:
  push:
    branches: [main, develop, 'v*']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: pytest - Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        env:
          PYTHONPATH: /workspace/projects:/workspace/projects/src
          COZE_WORKSPACE_PATH: /workspace/projects
        run: uv run pytest src/tests/unit/ -v --tb=short

      - name: Run integration tests
        env:
          PYTHONPATH: /workspace/projects:/workspace/projects/src
          COZE_WORKSPACE_PATH: /workspace/projects
        run: uv run pytest src/tests/integration/ -v --tb=short

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Check JSON config files valid
        run: |
          find config/ -name "*.json" -exec python -m json.tool {} \; > /dev/null
          echo "All JSON config files are valid"

      - name: Check Python syntax
        run: |
          uv run python -m py_compile src/graphs/graph.py
          uv run python -m py_compile src/graphs/state.py
          echo "Core graph files compile OK"

      - name: Check no src. prefix in imports
        run: |
          ! grep -rn "from src\." src/graphs/ src/utils/ src/tools/ --include="*.py" || (echo "ERROR: Found 'from src.' imports - forbidden!" && exit 1)
