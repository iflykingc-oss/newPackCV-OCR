# ============ Kubernetes部署 ============

apiVersion: v1
kind: Namespace
metadata:
  name: packcv
  labels:
    app: packcv-ocr

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: packcv-config
  namespace: packcv
data:
  LOG_LEVEL: "INFO"
  DB_HOST: "postgres.packcv.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "packcv"
  REDIS_HOST: "redis.packcv.svc.cluster.local"
  REDIS_PORT: "6379"
  OSS_ENDPOINT: "http://minio.packcv.svc.cluster.local:9000"
  OSS_BUCKET: "packcv"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: packcv-ocr
  namespace: packcv
spec:
  replicas: 3
  selector:
    matchLabels:
      app: packcv-ocr
  template:
    metadata:
      labels:
        app: packcv-ocr
    spec:
      containers:
        - name: packcv
          image: packcv-ocr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: packcv-config
            - secretRef:
                name: packcv-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: packcv-data
              mountPath: /app/data
            - name: packcv-logs
              mountPath: /app/logs
      volumes:
        - name: packcv-data
          persistentVolumeClaim:
            claimName: packcv-data-pvc
        - name: packcv-logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: packcv-ocr
  namespace: packcv
spec:
  selector:
    app: packcv-ocr
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: packcv-ocr
  namespace: packcv
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: packcv.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: packcv-ocr
                port:
                  number: 8000

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: packcv-ocr
  namespace: packcv
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: packcv-ocr
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
