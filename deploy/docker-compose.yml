# ============ Docker Compose ============

version: '3.8'

services:
  # 主应用
  packcv:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: packcv-ocr
    ports:
      - "8000:8000"
    environment:
      # 数据库
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=packcv
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-packcv_secret}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # 对象存储
      - OSS_ENDPOINT=http://minio:9000
      - OSS_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - OSS_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - OSS_BUCKET=packcv
      # 日志
      - LOG_LEVEL=INFO
    volumes:
      - packcv_data:/app/data
      - packcv_logs:/app/logs
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - packcv-network
    restart: unless-stopped

  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: packcv-postgres
    environment:
      - POSTGRES_DB=packcv
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-packcv_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - packcv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: packcv-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - packcv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO对象存储
  minio:
    image: minio/minio:latest
    container_name: packcv-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - packcv-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: packcv-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - packcv
    networks:
      - packcv-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  packcv_data:
  packcv_logs:

networks:
  packcv-network:
    driver: bridge
