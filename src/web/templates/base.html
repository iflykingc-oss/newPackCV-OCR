<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ i18n.app_title }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">📄</div>
          <div data-i18n="app.title">PackCV 管理后台</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="sidebar-nav-item {% if request.path == '/' or request.path.startswith('/dashboard') %}active{% endif %}" href="/">
          <span class="icon">📊</span><span data-i18n="nav.dashboard">仪表盘</span>
        </a>
        <a class="sidebar-nav-item {% if request.path.startswith('/tenants') %}active{% endif %}" href="/tenants">
          <span class="icon">👥</span><span data-i18n="nav.tenants">租户管理</span>
        </a>
        <a class="sidebar-nav-item {% if request.path.startswith('/usage') %}active{% endif %}" href="/usage">
          <span class="icon">📈</span><span data-i18n="nav.usage">用量统计</span>
        </a>
        <a class="sidebar-nav-item {% if request.path.startswith('/billing') %}active{% endif %}" href="/billing">
          <span class="icon">💰</span><span data-i18n="nav.billing">账单管理</span>
        </a>
        <a class="sidebar-nav-item {% if request.path.startswith('/settings') %}active{% endif %}" href="/settings">
          <span class="icon">⚙️</span><span data-i18n="nav.settings">系统设置</span>
        </a>
        <a class="sidebar-nav-item" href="/openapi-spec" target="_blank">
          <span class="icon">📚</span><span>API Docs</span>
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <div class="topbar-title">{% block page_title %}{{ i18n.app_title }}{% endblock %}</div>
        <div class="topbar-actions">
          <!-- 语言切换器 -->
          <select id="locale-selector" style="padding:0.375rem 0.5rem;border:1px solid var(--border);border-radius:6px;font-size:0.75rem;background:var(--bg-primary);color:var(--text-primary);cursor:pointer;margin-right:8px;">
            <option value="zh-CN">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
          <span style="color:var(--text-muted);font-size:0.875rem;" id="api-status">●</span>
          <input type="text" id="api-key-input" data-i18n-placeholder="settings.api_key_placeholder" placeholder="X-API-Key" style="padding:0.375rem 0.75rem;border:1px solid var(--border);border-radius:6px;font-size:0.75rem;width:280px;">
        </div>
      </header>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/app.js"></script>
  {% block scripts %}{% endblock %}

  <script>
    // 语言切换
    const localeSelector = document.getElementById('locale-selector');
    if (localeSelector) {
      localeSelector.addEventListener('change', (e) => {
        I18n.setLocale(e.target.value);
        // 刷新页面以应用新语言（后端模板也需要更新）
        location.reload();
      });
    }

    // 加载并保存 API Key
    const apiKeyInput = document.getElementById('api-key-input');
    if (apiKeyInput) {
      apiKeyInput.value = localStorage.getItem('packcv_api_key') || '';
      apiKeyInput.addEventListener('change', (e) => {
        localStorage.setItem('packcv_api_key', e.target.value);
        UI.toast(I18n.t('common.success'), 'success');
        location.reload();
      });
    }

    // 健康检查
    API.health().then(h => {
      const el = document.getElementById('api-status');
      if (el) el.innerHTML = '<span style="color:var(--success);">●</span> ' + I18n.t('dashboard.system_health');
    }).catch(() => {
      const el = document.getElementById('api-status');
      if (el) el.innerHTML = '<span style="color:var(--danger);">●</span> ' + I18n.t('common.error');
    });
  </script>
</body>
</html>
